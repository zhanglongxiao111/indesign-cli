<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Material Icons</title>
  <desc id="desc">Material palette icons for brick, glass, concrete, wood, metal, planted roof, paving, and water.</desc>
  <rect width="1200" height="800" fill="#ffffff"/>
