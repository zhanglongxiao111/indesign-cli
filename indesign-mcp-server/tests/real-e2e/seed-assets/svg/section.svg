  </g>
  <rect x="145" y="200" width="70" height="382" fill="#b08968" stroke="#343a40" stroke-width="4"/>
  <rect x="885" y="200" width="70" height="382" fill="#ced4da" stroke="#343a40" stroke-width="4"/>
  <path d="M215 200 H885 L820 125 H280 Z" fill="#74c69d" stroke="#2d6a4f" stroke-width="5"/>
